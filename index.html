<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка товара</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="product-card">
        <div class="product-card__image">
            <img src="images/product.jpg" alt="Товар">
        </div>
        <h3 class="product-card__title">Смартфон Pro</h3>
        <p class="product-card__description">
            Мощный смартфон с 6.7-дюймовым дисплеем, тройной камерой 108 МП и батареей 5000 мАч
        </p>
        <div class="product-card__footer">
            <span class="product-card__price">49 990 ₽</span>
            <button class="product-card__button">В корзину</button>
        </div>
    </div>
</body>
</html>
